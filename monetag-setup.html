<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RevMine — Monetag setup</title>
    <link rel="stylesheet" href="./styles.css?v=8" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <h1>Monetag setup</h1>
        <p class="admin-hint">
          Use this page if the in-game backoffice still fights your paste. It writes the same saved config as RevMine
          but never injects Monetag’s ownership snippet into <em>this</em> document. After saving, reload the main game
          (backoffice closed) so verification + SDK run there.
        </p>
        <p class="admin-hint"><a href="./index.html">← Back to RevMine</a></p>

        <section class="admin-box">
          <div id="setupLock">
            <input id="setupPin" type="password" placeholder="Admin PIN" autocomplete="off" />
            <button type="button" id="setupUnlockBtn">Unlock</button>
          </div>
          <div id="setupForm" class="hidden">
            <input
              id="setupMainZone"
              type="text"
              autocomplete="off"
              placeholder="Main Zone ID (when Monetag shows it — can be empty until then)"
            />
            <input id="setupRewardedZone" type="text" autocomplete="off" placeholder="Rewarded Zone ID (optional)" />
            <input id="setupSdkUrl" type="text" autocomplete="off" placeholder="SDK URL (optional)" />
            <input id="setupRewardCoins" type="number" min="50" step="50" autocomplete="off" placeholder="Rewarded bonus coins" />
            <textarea id="setupOwnership" rows="6" autocomplete="off" placeholder="Ownership verification HTML/script"></textarea>
            <button type="button" id="setupSaveBtn">Save to this browser</button>
          </div>
        </section>
        <p id="setupStatus" class="meta"></p>
      </section>
    </main>
    <script src="./monetag-setup.js?v=8"></script>
  </body>
</html>
